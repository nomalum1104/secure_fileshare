{% extends "base.html" %}
{% block content %}

<div style="max-width:400px; margin:80px auto;">
  <div style="text-align:center; margin-bottom:32px;">
    <div style="font-size:48px; margin-bottom:12px;">🔒</div>
    <h1 style="font-family:'Syne',sans-serif; font-size:28px; font-weight:800;">SecureFileShare</h1>
    <p style="color:var(--muted); margin-top:6px; font-size:13px;">Xavfsiz fayl almashish tizimi</p>
  </div>

  <div class="card">
    <div class="card-title">Tizimga kirish</div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Login</label>
        <input type="text" name="username" placeholder="Login" required autofocus>
      </div>
      <div class="form-group">
        <label>Parol</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Kirish</button>
    </form>
    <hr class="divider">
    <p style="text-align:center; color:var(--muted); font-size:13px;">
      Akkaunt yo'qmi? <a href="/register">Ro'yxatdan o'tish</a>
    </p>
    <p style="text-align:center; color:var(--muted); font-size:13px; margin-top:8px;">
      📧 <a href="/login/otp">Email OTP orqali kirish</a>
    </p>
  </div>
</div>

{% endblock %}
